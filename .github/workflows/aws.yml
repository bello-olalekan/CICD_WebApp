name: Deploy to ECS Fargate

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY || 'cicd-webapp' }}
  ECS_TASK_EXECUTION_ROLE_ARN: ${{ vars.ECS_TASK_EXECUTION_ROLE_ARN }}
  AWS_LOG_GROUP: ${{ vars.AWS_LOG_GROUP || '/ecs/cicd-webapp' }}
  CONTAINER_NAME: web
  TASK_DEFINITION_TEMPLATE: .aws/task-definition.json

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment settings
        run: |
          required_vars=(
            AWS_REGION
            ECR_REPOSITORY
            ECS_CLUSTER
            ECS_SERVICE
            ECS_TASK_EXECUTION_ROLE_ARN
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "::error::Set GitHub Actions variable $var_name"
              exit 1
            fi
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure AWS resources exist
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" >/dev/null

          aws logs describe-log-groups --log-group-name-prefix "$AWS_LOG_GROUP" \
            --query "logGroups[?logGroupName=='$AWS_LOG_GROUP'].logGroupName" \
            --output text | grep -q "$AWS_LOG_GROUP" \
            || aws logs create-log-group --log-group-name "$AWS_LOG_GROUP"

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$image" .
          docker push "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Prepare ECS task definition
        run: |
          cp "$TASK_DEFINITION_TEMPLATE" task-definition.rendered.json
          sed -i "s|TASK_FAMILY|$ECS_TASK_FAMILY|g" task-definition.rendered.json
          sed -i "s|TASK_EXECUTION_ROLE_ARN|$ECS_TASK_EXECUTION_ROLE_ARN|g" task-definition.rendered.json
          sed -i "s|AWS_REGION_VALUE|$AWS_REGION|g" task-definition.rendered.json
          sed -i "s|AWS_LOG_GROUP_VALUE|$AWS_LOG_GROUP|g" task-definition.rendered.json

      - name: Render image into ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.rendered.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
